name: Build Python Image

on:
  workflow_call:
    inputs:
      service-specific-input:
        description: "Name of the service/image to build"
        required: true
        default: "python-service"
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          # Use service-specific-input as image name
          IMAGE_NAME="${{ inputs.service-specific-input }}"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_ENV

          # Extract version from pyproject.toml
          VERSION=$(grep '^version = ' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          echo "image_tag=${VERSION}" >> $GITHUB_ENV

          echo "Building: ${IMAGE_NAME}:${VERSION}"

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.image_name }}"
          docker build -t ${IMAGE}:${{ env.image_tag }} .
          docker push ${IMAGE}:${{ env.image_tag }}

          # Also tag as 'latest'
          docker tag ${IMAGE}:${{ env.image_tag }} ${IMAGE}:latest
          docker push ${IMAGE}:latest
