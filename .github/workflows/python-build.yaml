name: Build Python Image

on:
  workflow_call:
    inputs:
      service-specific-input:
        description: "Name of the service/image to build"
        required: true
        default: "python-service"
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          # Use service-specific-input as image name
          IMAGE_NAME="${{ inputs.service-specific-input }}"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_ENV

          # Convert repository owner to lowercase for Docker
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> $GITHUB_ENV

          # Extract version from pyproject.toml
          VERSION=$(grep '^version = ' pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
          echo "image_tag=${VERSION}" >> $GITHUB_ENV

          echo "Building: ${IMAGE_NAME}:${VERSION}"

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.repo_owner }}/${{ env.image_name }}"
          docker build -t ${IMAGE}:${{ env.image_tag }} .
          docker push ${IMAGE}:${{ env.image_tag }}

          # Also tag as 'latest'
          docker tag ${IMAGE}:${{ env.image_tag }} ${IMAGE}:latest
          docker push ${IMAGE}:latest

      - name: Check if tag exists
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/${{ env.image_tag }}" > /dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_ENV
          else
            echo "tag_exists=false" >> $GITHUB_ENV
          fi

      - name: Create tag and GitHub Release
        if: github.ref == 'refs/heads/main' && env.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          # Create and push the tag
          git tag -a "${{ env.image_tag }}" -m "Release version ${{ env.image_tag }}"
          git push origin "${{ env.image_tag }}"
