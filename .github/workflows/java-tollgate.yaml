name: Java Quality Checks

on:
  workflow_call:
    inputs:
      service-specific-input:
        description: "Name of the service to run tollgate on"
        required: false
        default: "java-service"
        type: string

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    outputs:
      tests_exist: ${{ steps.check_tests.outputs.tests_exist }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Run Checkstyle linting
        continue-on-error: true
        run: |
          if [ -f "pom.xml" ]; then
            mvn checkstyle:check -q > checkstyle_output.txt 2>&1 || true
            # If checkstyle report exists, extract violation count
            if [ -f "target/checkstyle-result.xml" ]; then
              VIOLATIONS=$(grep -c "<error " target/checkstyle-result.xml || echo "0")
              echo "Checkstyle violations: ${VIOLATIONS}" >> checkstyle_output.txt
            fi
          else
            echo "No pom.xml found — skipping linting" > checkstyle_output.txt
          fi
          if [ ! -s checkstyle_output.txt ]; then
            echo "No linting issues found" > checkstyle_output.txt
          fi

      - name: Upload Checkstyle output
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-output
          path: checkstyle_output.txt

      - name: Check for tests
        id: check_tests
        run: |
          if find . -path "*/src/test/java/*.java" | grep -q .; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check_tests.outputs.tests_exist == 'true'
        continue-on-error: true
        run: |
          mvn test -q > /dev/null 2>&1 || true
          # Find surefire test report
          if find . -path "*/surefire-reports/TEST-*.xml" | grep -q .; then
            # Merge all test reports into one summary
            cat target/surefire-reports/TEST-*.xml > test_output.xml 2>/dev/null || true
          fi

      - name: Upload test results
        if: steps.check_tests.outputs.tests_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Check version in pom.xml
        run: |
          if [ -f "pom.xml" ]; then
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            LATEST_TAG=$(git tag | sort -V | tail -n1 || echo "0.0.0")

            echo "Current version: ${VERSION}"
            echo "Latest tag: ${LATEST_TAG}"
            echo "${LATEST_TAG} -> ${VERSION}" > version_info.txt

            # Compare versions
            if [ "$VERSION" = "$LATEST_TAG" ]; then
              echo "ERROR: Version not bumped" > version_check.txt
            elif [ "$(printf '%s\n' "$LATEST_TAG" "$VERSION" | sort -V | head -n1)" = "$LATEST_TAG" ]; then
              echo "OK" > version_check.txt
            else
              echo "ERROR: Version is lower than latest tag" > version_check.txt
            fi
          else
            echo "No pom.xml found — skipping version check" > version_info.txt
            echo "SKIP" > version_check.txt
          fi

      - name: Upload version check
        uses: actions/upload-artifact@v4
        with:
          name: version-check
          path: |
            version_info.txt
            version_check.txt

  comment-on-pr:
    runs-on: ubuntu-latest
    needs: [lint-and-test, version-check]
    if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'

    steps:
      - name: Download Checkstyle output
        uses: actions/download-artifact@v4
        with:
          name: checkstyle-output
          path: .

      - name: Download test results
        if: needs.lint-and-test.outputs.tests_exist == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./surefire-reports

      - name: Download version check
        uses: actions/download-artifact@v4
        with:
          name: version-check
          path: .

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let lintOutput = '';
            let testOutput = '';
            let versionOutput = '';
            let failWorkflow = false;

            // Read Checkstyle output
            if (fs.existsSync('checkstyle_output.txt')) {
              const rawLint = fs.readFileSync('checkstyle_output.txt', 'utf-8').trim();
              if (rawLint.includes('No linting issues found') || rawLint.includes('No pom.xml')) {
                lintOutput = '**Checkstyle:** No issues found ✅';
              } else {
                const violationMatch = rawLint.match(/Checkstyle violations: (\d+)/);
                const count = violationMatch ? violationMatch[1] : 'unknown';
                lintOutput = `**Checkstyle:** ${count} violations ⚠️\n<details>\n<summary>Details</summary>\n\n\`\`\`\n${rawLint}\n\`\`\`\n</details>`;
              }
            }

            // Read test results
            if ('${{ needs.lint-and-test.outputs.tests_exist }}' === 'true') {
              const reportDir = './surefire-reports';
              if (fs.existsSync(reportDir)) {
                const files = fs.readdirSync(reportDir).filter(f => f.startsWith('TEST-') && f.endsWith('.xml'));
                let totalTests = 0, totalFailures = 0, totalErrors = 0;

                for (const file of files) {
                  const content = fs.readFileSync(`${reportDir}/${file}`, 'utf-8');
                  const tests = content.match(/tests="(\d+)"/);
                  const failures = content.match(/failures="(\d+)"/);
                  const errors = content.match(/errors="(\d+)"/);
                  totalTests += tests ? parseInt(tests[1]) : 0;
                  totalFailures += failures ? parseInt(failures[1]) : 0;
                  totalErrors += errors ? parseInt(errors[1]) : 0;
                }

                const passed = totalTests - totalFailures - totalErrors;
                if (totalFailures === 0 && totalErrors === 0) {
                  testOutput = `**Tests:** ${passed} passed ✅`;
                } else {
                  testOutput = `**Tests:** ${passed} passed, ${totalFailures} failed, ${totalErrors} errors ❌`;
                  failWorkflow = true;
                }
              } else {
                testOutput = '**Tests:** Test execution failed ❌';
                failWorkflow = true;
              }
            } else {
              testOutput = '**Tests:** No test directory found ⚠️';
            }

            // Read version check
            if (fs.existsSync('version_check.txt') && fs.existsSync('version_info.txt')) {
              const versionCheck = fs.readFileSync('version_check.txt', 'utf-8').trim();
              const versionInfo = fs.readFileSync('version_info.txt', 'utf-8').trim();

              if (versionCheck === 'OK') {
                versionOutput = `**Version:** ${versionInfo} ✅`;
              } else if (versionCheck === 'SKIP') {
                versionOutput = `**Version:** ${versionInfo} ⚠️`;
              } else {
                versionOutput = `**Version:** ${versionInfo} - ${versionCheck} ❌`;
                failWorkflow = true;
              }
            }

            const commentBody = `## 🔍 Code Quality Report\n\n${lintOutput}\n\n${testOutput}\n\n${versionOutput}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

            if (failWorkflow) {
              core.setFailed('Code quality issues found');
            }
